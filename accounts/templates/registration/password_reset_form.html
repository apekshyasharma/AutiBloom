{% extends 'accounts/base.html' %}

{% block title %}Reset Password - AutiBloom{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-key fs-1 text-teal-600" style="color: var(--ab-primary);"></i>
                    <h3 class="fw-bold mt-2">Reset Password</h3>
                    <p class="text-muted small">Enter your email to receive reset instructions.</p>
                </div>

                <form method="post" class="needs-spinner">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}"
                            class="form-control" required>
                    </div>
                    {% endfor %}

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Send Instructions</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
