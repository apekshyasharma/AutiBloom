{% extends 'accounts/base.html' %}

{% block title %}Email Sent - AutiBloom{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="mb-4">
        <i class="bi bi-envelope-check display-1 text-success"></i>
    </div>
    <h2 class="fw-bold">Check Your Email</h2>
    <p class="lead text-muted">
        We've emailed you instructions for setting your password.<br>
        If an account exists with the email you entered, you should receive them shortly.
    </p>
    <a href="{% url 'login' %}" class="btn btn-outline-primary mt-3">Return to Login</a>
</div>
{% endblock %}
