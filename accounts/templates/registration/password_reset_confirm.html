{% extends 'accounts/base.html' %}

{% block title %}New Password - AutiBloom{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h3 class="fw-bold mb-4 text-center">Set New Password</h3>
                <form method="post" class="needs-spinner">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        <input type="password" name="{{ field.name }}" class="form-control" required>
                        {% if field.help_text %}
                        <div class="form-text small">{{ field.help_text|safe }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Save New Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
